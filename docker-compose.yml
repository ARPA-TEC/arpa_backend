services:
  db:
    image: mariadb:11
    container_name: arpa_db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root_password
      MARIADB_DATABASE: arpa-backend
      MARIADB_USER: arpa_user
      MARIADB_PASSWORD: arpa_password
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -u root -proot_password || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arpa_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3000
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: arpa_user
      DB_PASSWORD: arpa_password
      DB_NAME: arpa-backend
      JWT_SECRET: 49004de1de499d87b354c82b30bc8adc8facfacc0e58582fe4143e8bd92d8688
      JWT_EXPIRES_IN: 8h
    ports:
      - "3000:3000"

volumes:
  db_data:
